name: Backend and E2E Test CI

on:
  push:
    branches: ["dev", "feat/**", "test"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "e2e/**"
      - ".github/workflows/test.yaml"
  pull_request:
    branches: ["dev", "test", "main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "e2e/**"
      - ".github/workflows/test.yaml"
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (unit tests)
        env:
          DATABASE_URL_TEST: postgresql://user:pass@localhost:5432/unit_test_dummy
        run: npx prisma generate

      - name: Run unit tests
        run: npm run test:unit

  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/testdb?schema=public
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb?schema=public
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate test database URL
        run: |
          if [ -z "$DATABASE_URL_TEST" ]; then
            echo "DATABASE_URL_TEST is missing or unavailable."
            exit 1
          fi
          case "$DATABASE_URL_TEST" in
            postgresql://*|postgres://*) ;;
            *)
              echo "DATABASE_URL_TEST must start with postgres:// or postgresql://"
              exit 1
              ;;
          esac

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npm run db:migrate:prod

      - name: Run Pretest Script
        run: npm run pretest:integration

      - name: Run API tests
        run: npm run test:integration

  e2e-tests:
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/testdb?schema=public
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb?schema=public
      SEED_OWNER_PASSWORD: owner123
      SEED_STAFF_PASSWORD: staff123
      E2E_BASE_URL: http://localhost:5173
      VITE_API_BASE_URL: http://localhost:5001
      E2E_HEADLESS: true
      E2E_UI_TIMEOUT_MS: 60000
      E2E_ALLOW_NON_TEST_DB_RESET: true
      E2E_USE_EXISTING_BACKEND: false
      E2E_LOGIN_USERNAME: staff
      E2E_LOGIN_PASSWORD: staff123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install E2E dependencies
        run: npm --prefix e2e ci

      - name: Install Playwright browsers
        run: npm --prefix e2e run playwright:install

      - name: Validate E2E secrets and DB URL
        run: |
          if [ -z "$DATABASE_URL_TEST" ]; then
            echo "DATABASE_URL_TEST is missing or unavailable."
            exit 1
          fi

          case "$DATABASE_URL_TEST" in
            postgresql://*|postgres://*) ;;
            *)
              echo "DATABASE_URL_TEST must start with postgres:// or postgresql://"
              exit 1
              ;;
          esac

      - name: Generate Prisma Client
        run: npm --prefix backend run db:generate

      - name: Run Prisma migrations
        run: npm --prefix backend run db:migrate:prod

      - name: Run E2E tests (managed backend)
        run: |
          set -euo pipefail

          npm --prefix frontend run dev -- --host localhost --port 5173 > /tmp/frontend.log 2>&1 &
          FRONTEND_PID=$!

          cleanup() {
            kill "$FRONTEND_PID" >/dev/null 2>&1 || true
            wait "$FRONTEND_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS http://localhost:5173 >/dev/null 2>/dev/null; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS http://localhost:5173 >/dev/null; then
            echo "Frontend failed to become ready."
            cat /tmp/frontend.log
            exit 1
          fi

          if ! kill -0 "$FRONTEND_PID" >/dev/null 2>&1; then
            echo "Frontend process exited before E2E execution."
            cat /tmp/frontend.log
            exit 1
          fi

          echo "Frontend startup log tail:"
          tail -n 60 /tmp/frontend.log || true

          set +e
          npm --prefix e2e run test:e2e:ci
          TEST_EXIT=$?
          set -e

          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "E2E failed. Frontend log tail:"
            tail -n 200 /tmp/frontend.log || true
            exit "$TEST_EXIT"
          fi

