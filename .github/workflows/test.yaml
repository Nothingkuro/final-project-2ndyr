name: Backend Test CI

on:
  push:
    branches: ["dev", "feat/**", "test"]
    paths:
      - "backend/**"
      - ".github/workflows/test.yaml"
  pull_request:
    branches: ["dev", "test", "main"]
    paths:
      - "backend/**"
      - ".github/workflows/test.yaml"
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (unit tests)
        env:
          DATABASE_URL_TEST: postgresql://user:pass@localhost:5432/unit_test_dummy
        run: npx prisma generate

      - name: Run unit tests
        run: npm run test:unit

  api-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate test database URL
        run: |
          if [ -z "$DATABASE_URL_TEST" ]; then
            echo "DATABASE_URL_TEST is missing or unavailable."
            exit 1
          fi
          case "$DATABASE_URL_TEST" in
            postgresql://*|postgres://*) ;;
            *)
              echo "DATABASE_URL_TEST must start with postgres:// or postgresql://"
              exit 1
              ;;
          esac

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npm run db:migrate:prod

      - name: Run Pretest Script
        run: npm run pretest:integration

      - name: Run API tests
        run: npm run test:integration
